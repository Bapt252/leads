name: Déployer sur GitHub Pages

on:
  # Déploie sur chaque push vers main (code OU leads.json).
  push:
    branches: [main]
  # Permet un redéploiement manuel si besoin.
  workflow_dispatch:

# Permissions requises par l'action actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Empêche deux déploiements simultanés mais laisse les pushes en cours se
# terminer avant d'en lancer un nouveau (pas de cancel-in-progress).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static
        env:
          # URL publique du Worker Cloudflare (non sensible, juste une URL).
          NEXT_PUBLIC_WORKER_URL: ${{ vars.NEXT_PUBLIC_WORKER_URL }}
        run: npm run build

      - name: Ajouter .nojekyll
        # Empêche GitHub Pages d'ignorer les dossiers commençant par _ (ex: _next/).
        run: touch out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

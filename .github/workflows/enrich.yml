name: Enrichir leads.json

on:
  # Cron journalier : tous les jours à 6h UTC (~7h/8h Paris selon l'heure d'été).
  schedule:
    - cron: '0 6 * * *'
  # Déclenchable manuellement depuis l'UI ou l'API GitHub (bouton "Ingérer maintenant").
  workflow_dispatch:

# Permission d'écrire un commit sur le repo via le GITHUB_TOKEN par défaut.
permissions:
  contents: write

# Une seule exécution à la fois : évite deux commits concurrents.
concurrency:
  group: enrich
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enrichir leads.json
        env:
          FRANCE_TRAVAIL_WORKER_URL: ${{ secrets.FRANCE_TRAVAIL_WORKER_URL }}
          FRANCE_TRAVAIL_WORKER_KEY: ${{ secrets.FRANCE_TRAVAIL_WORKER_KEY }}
        run: npm run enrich

      - name: Commit si changements
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/leads.json
          if git diff --staged --quiet; then
            echo "Aucun changement dans leads.json"
          else
            git commit -m "chore(leads): enrichissement automatique"
            git push
          fi
